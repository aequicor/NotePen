manifest_version: "1.0.0"
kit_version: "2.4.1"
language_code: ru

# ── PROJECT ─────────────────────────────────────────────────────────────────
project:
  name: "NotePen"
  slug: "note-pen"
  description: "Мощное приложение для аннотирования PDF с бесконечным холстом для Android и Desktop"

stack:
  languages: ["kotlin"]
  frameworks: ["compose-multiplatform"]
  build_command:   "./gradlew"
  compile_command: "./gradlew compileKotlin"
  lint_command:    "./gradlew detekt ktlintCheck"
  test_command:    "./gradlew :[module]:test"
  format_command:  "./gradlew detekt --auto-correct"
  profiles:
    - kotlin-gradle
    - compose-multiplatform
    - security-baseline
    - solid
    - clean-architecture

modules:
  - name: common
    source_root: "app/byCompose/common/src/commonMain/kotlin/ru/kyamshanov/notepen/"
    test_root:   "app/byCompose/common/src/commonTest/kotlin/ru/kyamshanov/notepen/"
    docs_path:   "vault/common/"
    responsibility: "Compose Multiplatform UI: рендеринг PDF, холст для рисования, управление страницами"
  - name: shared
    source_root: "shared/src/commonMain/kotlin/"
    test_root:   "shared/src/commonTest/kotlin/"
    docs_path:   "vault/shared/"
    responsibility: "Кросс-платформенная бизнес-логика и доменные модели"

# ── TARGETS (runners) ───────────────────────────────────────────────────────
targets:
  - id: claude-code
    native_provider: anthropic
    can_use_via: []

render_targets: [claude-code]

# ── PROVIDERS ───────────────────────────────────────────────────────────────
providers:
  - id: anthropic
    kind: anthropic
    auth: subscription
    timeout_seconds: 120
    max_retries: 2

# ── MODELS ──────────────────────────────────────────────────────────────────
models:
  - id: opus
    provider: anthropic
    model: claude-opus-4-7
    family: anthropic
    tier: reasoner
    capabilities: [reasoning, code, vision, tools, long-context]
    context_window: 200000
    params: { temperature: 0.2, max_tokens: 8000, reasoning_effort: high }
    cost_hint: premium
    priority: 10
  - id: sonnet
    provider: anthropic
    model: claude-sonnet-4-6
    family: anthropic
    tier: balanced
    capabilities: [code, tools, long-context]
    context_window: 200000
    params: { temperature: 0.1, max_tokens: 16000 }
    cost_hint: balanced
    priority: 10
  - id: haiku
    provider: anthropic
    model: claude-haiku-4-5-20251001
    family: anthropic
    tier: fast
    capabilities: [tools]
    cost_hint: cheap
    priority: 10

# ── TASK TYPES ──────────────────────────────────────────────────────────────
task_types:
  - { id: planning,       prefers: reasoner, needs: [reasoning, long-context] }
  - { id: implementation, prefers: balanced, needs: [code] }
  - { id: review,         prefers: reasoner, needs: [reasoning, code] }
  - { id: debug,          prefers: reasoner, needs: [code, reasoning] }
  - { id: refactor,       prefers: balanced, needs: [code] }
  - { id: research,       prefers: reasoner, needs: [reasoning] }
  - { id: security-audit, prefers: reasoner, min_tier: reasoner, needs: [reasoning, code] }
  - { id: triage,         prefers: fast }
  - { id: summarize,      prefers: fast }

# ── PROMPT DIALECTS ──────────────────────────────────────────────────────────
prompt_dialects:
  - { id: anthropic, path: ./dialects/anthropic }
  - { id: generic,   path: ./dialects/generic }

# ── TARGET ADAPTERS ──────────────────────────────────────────────────────────
target_adapters:
  - { id: claude-code, path: ./target_adapters/claude-code }

shared:
  path: ./_shared

# ── AGENTS ───────────────────────────────────────────────────────────────────
agents:
  - id: Main
    role: orchestrator
    description: "Единая точка входа. Классифицирует задачи и диспетчеризирует подагентов."
    mode: primary
    model_selection:
      needs: [reasoning, tools]
      prefers: reasoner
      by_task:
        triage:    { prefers: fast }
        summarize: { prefers: fast }
    prompt: { default: { include: prompts/Main.md } }
    tools: ["*"]
    permissions: { edit: true, bash: true, web: true }

  - id: Architect
    role: architect
    description: "Автор spec.md + скелет plan.md. Один проход, без replanning."
    model_selection:
      needs: [reasoning, long-context]
      prefers: reasoner
      min_tier: reasoner
    prompt: { default: { include: prompts/Architect.md } }
    tools: [serena, context7, web-search]
    permissions: { edit: true, web: true }
    context_scope:
      include_paths: ["vault/**", "docs/**", "README.md"]
      max_tokens: 30000

  - id: CodeWriter
    role: code-writer
    description: "TDD-first реализация, по одному срезу за раз."
    model_selection:
      needs: [code]
      prefers: balanced
      by_task:
        debug:    { prefers: reasoner }
        refactor: { prefers: balanced }
    prompt:
      default:   { include: prompts/CodeWriter.md }
      anthropic: { include: prompts/CodeWriter.anthropic.md }
      qwen:      { include: prompts/CodeWriter.qwen.md }
    tools: [kotlin-lsp, serena]
    permissions: { edit: true, bash: true }

  - id: Verifier
    role: verifier
    description: "Режимная верификация (build / review / DoD / trace / mutation-sample)."
    model_selection:
      needs: [reasoning, code]
      prefers: reasoner
      min_tier: balanced
    prompt: { default: { include: prompts/Verifier.md } }
    permissions: { edit: false, bash: true }

  - id: BugFixer
    role: bug-fixer
    description: "Отладка + исправление + регрессионный тест."
    model_selection:
      needs: [code]
      prefers: balanced
      by_severity:
        critical: { prefers: reasoner, min_tier: reasoner }
        high:     { prefers: reasoner }
        medium:   { prefers: balanced }
        low:      { prefers: balanced, max_cost: cheap }
    prompt: { default: { include: prompts/BugFixer.md } }
    tools: [kotlin-lsp, serena]
    permissions: { edit: true, bash: true }

  - id: Researcher
    role: researcher
    description: "Исследование кодовой базы и внешних источников."
    model_selection:
      needs: [reasoning]
      prefers: reasoner
    prompt: { default: { include: prompts/Researcher.md } }
    tools: [serena, context7, web-search, knowledge-os]
    permissions: { edit: false, web: true }

# ── KNOWLEDGE ────────────────────────────────────────────────────────────────
knowledge:
  constitution:
    sections:
      - routing:         { source: { include: knowledge/routing-table.md } }
      - conventions:     { source: { include: knowledge/conventions.md } }
      - retrieval_hooks: { source: { include: knowledge/retrieval-hooks.md } }
      - orchestration:   { source: { include: knowledge/orchestration.md } }
    max_tokens: 8000

  specialists:
    triggers:
      - { match: "task: refactor", invoke: CodeWriter, with_task: refactor }

  specs:
    kind: mcp
    tool: knowledge-os
    layout:
      feature:   { fm.type: "domain",    fm.scope: "feature" }
      subsystem: { fm.type: "reference", fm.scope: "subsystem" }
      decision:  { fm.type: "decision" }
      techdebt:  { fm.type: "tech-debt" }
      lookup:    { fm.type: "documentation" }
    indexing:
      include: ["**/*.md"]
      exclude: ["**/draft-*.md"]

  session:
    kind: filesystem
    path: .planning
    layout:
      current:  "CURRENT.md"
      task:     "tasks/{task_id}.md"
      decision: "DECISIONS.md"

# ── TOOLS / MCP ──────────────────────────────────────────────────────────────
tools:
  - id: context7
    kind: mcp-http
    url: "https://mcp.context7.com/mcp"
    api_key_env: CONTEXT7_API_KEY
  - id: web-search
    kind: builtin
    enabled: true
  - id: knowledge-os
    kind: mcp-http
    url: "http://localhost:8081/mcp"
    enabled: true

# ── WORKFLOWS ─────────────────────────────────────────────────────────────────
workflows:
  - id: feature
    description: "Classify → analysis → plan → confirm → execute → reconcile/trace/dod → diff-review → close."
    trigger: "/kit-new-feature"
    steps:
      - { agent: Architect,  task: planning,       gate: approve }
      - { agent: CodeWriter, task: implementation, gate: auto, on_fail: retry, max_retries: 3 }
      - { agent: Verifier,   task: review,         gate: auto, on_fail: rollback }
      - { agent: Verifier,   task: review,         gate: ground-truth }
      - { agent: Verifier,   task: review,         gate: diff-review }

  - id: bug-fix
    trigger: "/kit-fix"
    steps:
      - { agent: BugFixer, task: triage, gate: auto }
      - { agent: BugFixer, task: debug,  gate: auto }
      - { agent: Verifier, task: review, gate: approve }

  - id: tech-debt
    trigger: "/kit-techdebt"
    steps:
      - { agent: Architect,  task: planning, gate: approve }
      - { agent: CodeWriter, task: refactor, gate: auto }
      - { agent: Verifier,   task: review,   gate: diff-review }

  - id: sleep
    trigger: "/kit-sleep"
    steps:
      - { agent: Architect,  task: planning,       gate: auto }
      - { agent: CodeWriter, task: implementation, gate: auto, on_fail: retry, max_retries: 6 }
      - { agent: Verifier,   task: review,         gate: auto, on_fail: retry, max_retries: 6 }
      - { agent: Verifier,   task: review,         gate: auto }

# ── POLICIES ─────────────────────────────────────────────────────────────────
policies:
  auto_approve:
    feature: false
    bug:
      low: true
      medium: true
      high: false
      critical: false
    diff_review: false

  slice_caps:
    max_steps: 6
    max_files_per_step: 5
    max_lines_per_step: 400
    max_tokens_per_step: 30000

  test_strategy: tdd_first

  lanes:
    default_risk: standard
    auto_classify: true
    trivial_max_files: 1
    trivial_max_lines: 30
    trivial_no_new_public_symbols: true
    critical_block_sleep: true
    critical_require_mutation_sample: true

  ground_truth:
    required: true
    exclusions: { modules: [] }
    default_types:
      ui: screenshot
      api: contract-test-pass
      cli: command-output-diff
      backend: mutation-sample-pass
      refactor: diff-stat-and-smoke

  mutation_sample:
    max_mutants: 10
    timeout_seconds: 300
    fallback_ai: false
    scope: all_changed

  session_isolation:
    mode: per_step
    prompt_style: both

  auto_commit_per_step: true
  allow_internal_steps: true

  telemetry:
    gates_log_enabled: true
    evaluation_window_tasks: 30
    signal_ratio_threshold: 0.05

  forbidden_patterns: []

  secrets_policy:
    deny_literal_keys: true
    deny_patterns: []

  model_constraints:
    security-audit:
      min_tier: reasoner
      require_capabilities: [reasoning, code]
    planning:
      min_tier: reasoner

# ── CONTEXT ───────────────────────────────────────────────────────────────────
context:
  ignore_globs:
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".gradle/**"
    - "target/**"
    - "*.lock"
    - "*.hprof"
  max_total_files: 200

extends: []
