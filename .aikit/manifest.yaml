manifest_version: "3.0.0"
language_code: ru

project:
  name: "NotePen"
  slug: "notepen"
  description: "Kotlin Multiplatform note-taking app for Android and Desktop"

stack:
  languages: [kotlin]
  frameworks: [compose-multiplatform, android, desktop]
  build_command: "./gradlew build"
  test_command: "./gradlew test"
  lint_command: "./gradlew ktlintCheck"
  format_command: "./gradlew ktlintFormat"
  run_command: "./gradlew runDesktop"

modules:
  - name: shared
    source_root: shared/src
    test_root: shared/src/commonTest
    responsibility: "Shared business logic and data models (KMP common)"
  - name: app-common
    source_root: app/byCompose/common/src
    test_root: app/byCompose/common/src/commonTest
    responsibility: "Shared Compose UI components across platforms"
  - name: app-android
    source_root: app/byCompose/android/src
    test_root: app/byCompose/android/src/test
    responsibility: "Android application entry point"
  - name: app-desktop
    source_root: app/byCompose/desktop/src
    test_root: app/byCompose/desktop/src/test
    responsibility: "Desktop (JVM) application entry point"
  - name: app-theme
    source_root: app/byCompose/theme/src
    test_root: app/byCompose/theme/src/commonTest
    responsibility: "Design tokens, typography, color schemes"
  - name: app-uikit
    source_root: app/byCompose/uikit/src
    test_root: app/byCompose/uikit/src/commonTest
    responsibility: "Reusable UI kit components"

targets:
  - id: claude-code
    native_provider: anthropic
    adapter: claude-code

render_targets: [claude-code]

providers:
  - id: anthropic
    kind: anthropic
    auth: subscription

models:
  - id: sonnet
    provider: anthropic
    family: anthropic
    model: claude-sonnet-4-6
    tier: balanced
    priority: 100

prompt_dialects:
  - id: anthropic
    path: dialects/anthropic

target_adapters:
  - id: claude-code
    path: target_adapters/claude-code

agents:
  - id: Main
    role: orchestrator
    description: "AI-Kit v4 pipeline driver — runs Session 1/2/3 of /kit, /kit-do, /kit-fix"
    prompt: { include: prompts/Main.md }
    tools: [Read, Edit, Write, Glob, Grep, Bash]
  - id: Researcher
    description: "Session 1 Stage 1 helper — returns one focused digest, never writes code"
    prompt: { include: prompts/Researcher.md }
    tools: [Read, Glob, Grep, WebFetch]

tools:
  - id: knowledge-os
    kind: mcp-http
    url: "http://localhost:8081/mcp"
    enabled: true
  - id: serena
    kind: mcp-stdio
    command: uvx
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
      - "--context"
      - "ide-assistant"
      - "--project"
      - "."
    enabled: true

policies:
  forbidden_patterns:
    - "Do not commit to main directly — use feature branches"
    - "Do not hardcode credentials or secrets in source files"
    - "Clean Architecture: do not let UI/presentation layer reference domain or data layer directly — depend only on abstractions"
    - "Clean Architecture: do not place business logic in Composables or ViewModels — keep it in use-case / domain classes"
    - "SOLID — Single Responsibility: one class, one reason to change; split classes that mix concerns"
    - "SOLID — Open/Closed: extend behaviour via interfaces and composition, not by modifying existing classes"
    - "SOLID — Liskov Substitution: subtypes must be substitutable for their base types without altering correctness"
    - "SOLID — Interface Segregation: do not force callers to depend on methods they do not use; split fat interfaces"
    - "SOLID — Dependency Inversion: depend on abstractions, not concretions; inject dependencies from outside"
  optional_skills:
    - tdd-cycle
    - security-checklist
    - doubt-driven-review
    - simplification-pass
    - adr-on-decision
