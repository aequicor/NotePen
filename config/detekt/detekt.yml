# detekt configuration for NotePen.
#
# `buildUponDefaultConfig = true` is set in the root build script, so detekt's full
# default rule set is active. Only deviations from those defaults belong here.

complexity:
  LongMethod:
    # Jetpack Compose @Composable functions are declarative UI trees that are naturally long;
    # splitting them purely to satisfy a statement count harms readability rather than helping.
    # Same Compose rationale as the FunctionNaming / Unused* exemptions below.
    ignoreAnnotated: ['Composable']

naming:
  FunctionNaming:
    # Jetpack Compose @Composable functions are intentionally PascalCase.
    ignoreAnnotated: ['Composable']

style:
  MagicNumber:
    # Compose UI code is dense with dp/sp literals; flagging each one is noise.
    active: false
  MaxLineLength:
    # Align with the project's .editorconfig (`max_line_length = 140`, used by
    # ktlint). detekt defaults to 120, which contradicts that standard and makes
    # ktlintFormat (collapses ≤140) fight detekt (flags >120) on the same line.
    maxLineLength: 140
  # detekt 2.0 split UnusedPrivateMember into these finer-grained rules.
  UnusedParameter:
    ignoreAnnotated: ['Composable', 'Preview']
  UnusedPrivateFunction:
    ignoreAnnotated: ['Composable', 'Preview']
  UnusedPrivateProperty:
    ignoreAnnotated: ['Composable', 'Preview']
