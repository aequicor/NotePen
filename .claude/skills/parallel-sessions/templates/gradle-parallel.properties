# Parallel-build tuning — merge into the project's gradle.properties.
# Sized for your number of concurrent Gradle daemons (one per worktree session).
# Per-session -Xmx guidance (total RAM ÷ session count) is in CLAUDE.md and the parallel-sessions skill.

org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# RAM is the bottleneck with multiple daemons: keep (maxParallelSessions * -Xmx) well under total RAM,
# leaving headroom for the OS and any running emulators. Example below ≈ 3 GB/daemon — adjust to your box.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m

kotlin.incremental=true

# Note: kotlin.parallel.tasks.in.project was REMOVED in Kotlin 1.6.20 — do not add it.
# Per-daemon compiler parallelism is governed by kotlin.compiler.execution.strategy (default is fine).
