name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build release APK
        run: ./gradlew :app:byCompose:android:assembleRelease -Papp.version=${{ env.APP_VERSION }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK to NotePen-<version>.apk
        run: |
          src=$(find app/byCompose/android/build/outputs/apk/release -name '*.apk' ! -name '*unsigned*' | head -n1)
          mv "$src" "app/byCompose/android/build/outputs/apk/release/NotePen-${APP_VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/byCompose/android/build/outputs/apk/release/NotePen-*.apk
          if-no-files-found: error

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        run: ./gradlew :app:byCompose:desktop:packageReleaseDmg -Papp.version=${{ env.APP_VERSION }}

      # Compose/jpackage не задаёт иконку тома DMG (видна в заголовке окна
      # установщика). Ставим её пост-обработкой: монтируем DMG в r/w-режиме,
      # кладём .VolumeIcon.icns и выставляем флаг кастомной иконки, затем
      # пересобираем в сжатый формат. Тот же приём использует create-dmg.
      - name: Set DMG volume icon
        run: |
          set -euo pipefail
          dmg_dir=app/byCompose/desktop/build/compose/binaries/main-release/dmg
          dmg=$(find "$dmg_dir" -name '*.dmg' | head -n1)
          icns=app/byCompose/desktop/icons/app_icon.icns
          rw=$(mktemp -u).dmg
          hdiutil convert "$dmg" -format UDRW -o "$rw"
          mount=$(hdiutil attach "$rw" -nobrowse -noverify -noautoopen | grep -Eo '/Volumes/.*' | head -n1)
          cp "$icns" "$mount/.VolumeIcon.icns"
          SetFile -a C "$mount"
          hdiutil detach "$mount"
          rm -f "$dmg"
          hdiutil convert "$rw" -format UDZO -o "$dmg"
          rm -f "$rw"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: app/byCompose/desktop/build/compose/binaries/main-release/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract version from tag
        shell: bash
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build Windows MSI
        shell: bash
        run: ./gradlew :app:byCompose:desktop:packageReleaseMsi -Papp.version=${{ env.APP_VERSION }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: app/byCompose/desktop/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-android, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/android-apk/*.apk
            artifacts/macos-dmg/*.dmg
            artifacts/windows-msi/*.msi
